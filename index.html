<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" />
  <title>Lavoisier — Laboratório Visual de Química</title>
  <meta name="description" content="Laboratório interativo de pensamento químico. Visualize átomos, moléculas, ligações e reações." />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/mobile.css" />
</head>
<body>

  <!-- =====================================================================
       HEADER
  ====================================================================== -->
  <header class="app-header" role="banner">
    <div class="header-inner">
      <a class="header-logo" href="#/" aria-label="Lavoisier — página inicial">
        <svg class="logo-icon" viewBox="0 0 32 32" aria-hidden="true">
          <!-- núcleo: fixo no centro, não rotaciona -->
          <circle cx="16" cy="16" r="3.5" fill="currentColor" opacity="0.9"/>
          <!--
            Órbitas e elétrons girados −30° para que os 3 elétrons formem
            triângulo visualmente simétrico: topo-esquerdo / topo-direito / baixo-centro.
            Coordenadas dos elétrons ANTES da rotação (sobre as pontas das órbitas):
              (30,16) → (28,9)  topo-direito
              (9,4)   → (4,9)   topo-esquerdo
              (9,28)  → (16,30) baixo-centro
          -->
          <g transform="rotate(-30, 16, 16)">
            <ellipse cx="16" cy="16" rx="14" ry="5" fill="none" stroke="currentColor" stroke-width="1.4" opacity="0.65"/>
            <ellipse cx="16" cy="16" rx="14" ry="5" fill="none" stroke="currentColor" stroke-width="1.4" opacity="0.65" transform="rotate(60 16 16)"/>
            <ellipse cx="16" cy="16" rx="14" ry="5" fill="none" stroke="currentColor" stroke-width="1.4" opacity="0.65" transform="rotate(120 16 16)"/>
            <circle cx="30" cy="16" r="2" fill="var(--accent-electron)" opacity="0.95"/>
            <circle cx="9"  cy="4"  r="2" fill="var(--accent-bond)"     opacity="0.95"/>
            <circle cx="9"  cy="28" r="2" fill="var(--accent-organic)"  opacity="0.95"/>
          </g>
        </svg>
        <span class="logo-name">Lavoisier</span>
        <span class="logo-sub">Laboratório Visual de Química</span>
      </a>

      <nav class="header-nav" aria-label="Navegação principal">
        <button class="nav-btn" data-route="/" aria-label="Início">Início</button>
        <button class="nav-btn" data-route="/modules" aria-label="Módulos">Módulos</button>
        <button class="nav-btn" data-route="/sandbox" aria-label="Laboratório livre">Laboratório</button>
        <button class="nav-btn" data-route="/about" aria-label="Sobre">Sobre</button>
      </nav>

      <button class="hamburger" id="hamburger" aria-label="Abrir menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- Mobile sidebar -->
  <aside class="sidebar" id="sidebar" aria-label="Menu lateral" aria-hidden="true">
    <button class="sidebar-close" id="sidebar-close" aria-label="Fechar menu">&#x2715;</button>
    <nav class="sidebar-nav" aria-label="Navegação lateral">
      <button class="nav-btn sidebar-link" data-route="/">Início</button>
      <button class="nav-btn sidebar-link" data-route="/modules">Módulos</button>
      <button class="nav-btn sidebar-link" data-route="/sandbox">Laboratório</button>
      <button class="nav-btn sidebar-link" data-route="/about">Sobre</button>
    </nav>
    <div class="sidebar-ecosystem">
      <p class="sidebar-eco-label">Ecossistema educacional</p>
      <a href="https://luddevergard3n.github.io/Herodoto/" target="_blank" rel="noopener">Heródoto</a>
      <a href="https://luddevergard3n.github.io/euclides/" target="_blank" rel="noopener">Euclides</a>
      <a href="https://luddevergard3n.github.io/quintiliano/" target="_blank" rel="noopener">Quintiliano</a>
      <a href="https://luddevergard3n.github.io/johnson-english/" target="_blank" rel="noopener">Johnson</a>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

  <!-- =====================================================================
       MAIN CONTENT — SPA router renders here
  ====================================================================== -->
  <main id="app" role="main" aria-live="polite" aria-atomic="false">
    <div class="loading-screen" id="loading-screen" aria-label="Carregando">
      <div class="loading-atom" aria-hidden="true">
        <div class="loading-nucleus"></div>
        <div class="loading-orbit orbit-1"><div class="loading-electron"></div></div>
        <div class="loading-orbit orbit-2"><div class="loading-electron"></div></div>
      </div>
      <p>Carregando laboratório...</p>
    </div>
  </main>

  <!-- =====================================================================
       SKIP LINK (acessibilidade)
  ====================================================================== -->
  <a class="skip-link" href="#app">Ir para o conteúdo</a>

  <!-- =====================================================================
       TOAST / FEEDBACK
  ====================================================================== -->
  <div class="toast-region" id="toast-region" role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- =====================================================================
       SCRIPTS — ES Modules
  ====================================================================== -->
  <script type="module" src="js/main.js"></script>

</body>
</html>
